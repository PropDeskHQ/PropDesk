<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PropDesk Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
input,select,button{font-family:inherit}
button{cursor:pointer}
.pill-btn{border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;border:1px solid #2a2a2a;background:transparent;color:#555}
.pill-btn.active{background:#252525;color:#e8e8e8;border-color:#444}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge.ELITE{background:#2d1f5e;color:#a78bfa}
.badge.GREAT{background:#1a3326;color:#22c55e}
.badge.GOOD{background:#1a2a3e;color:#3b82f6}
.badge.VALUE{background:#3b2a0a;color:#f59e0b}
.res-btn{border-radius:5px;padding:3px 8px;font-size:11px;font-weight:700;border:1px solid #252525;background:transparent;color:#333}
.res-btn.active-hit{background:#22c55e22;color:#22c55e;border-color:#22c55e44}
.res-btn.active-miss{background:#ef444422;color:#ef4444;border-color:#ef444444}
.res-btn.active-void{background:#55555522;color:#555;border-color:#55555544}
.res-btn.active-pending{background:#88888822;color:#888;border-color:#88888844}
.day-wrap{margin-bottom:6px;border:1px solid #252525;border-radius:10px;overflow:hidden}
.imp-tbl{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:0 12px;margin:10px 0}
.imp-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1c1c1c;transition:border-left-color .12s;border-left:3px solid transparent}
.imp-row:last-child{border-bottom:none}
.imp-row.sel{border-left-color:#22c55e44}
.imp-row.dupe{opacity:.32}
.day-hdr{width:100%;background:#1a1a1a;border:none;padding:11px 14px;text-align:left;display:flex;align-items:center;gap:8px;min-height:44px}
.day-hdr:hover{background:#1e1e1e}
.day-body{background:#161616;padding:12px 16px}
.play-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1c1c1c;flex-wrap:wrap}
.play-row:last-child{border-bottom:none}
.ctx-bar{background:#1a1a1a;border:1px solid #252525;border-radius:8px;padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.bulk-row{display:flex;gap:8px;margin-bottom:10px}
.infield{background:#111;border:1px solid #333;border-radius:6px;padding:7px 10px;color:#e8e8e8;font-size:13px;width:100%;outline:none}
.infield:focus{border-color:#444}
label.fl{font-size:11px;color:#555;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>

<!-- Password gate -->
<div id="gate" style="position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;z-index:999">
  <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:32px 28px;width:300px;text-align:center">
    <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px">PropDesk Admin</div>
    <div style="font-size:13px;color:#555;margin-bottom:22px">Enter password to continue</div>
    <input id="pwInput" type="password" placeholder="Password" class="infield" style="margin-bottom:10px">
    <button onclick="checkPw()" style="width:100%;background:#22c55e;color:#000;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700">Enter</button>
    <div id="pwErr" style="font-size:12px;color:#ef4444;margin-top:8px;display:none">Incorrect password</div>
  </div>
</div>

<!-- Main -->
<div id="main" style="display:none;max-width:920px;margin:0 auto;padding:24px 16px 60px">

  <!-- Header -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px">
    <div>
      <h1 style="font-size:19px;font-weight:700;color:#fff">PropDesk Admin</h1>
      <div id="subtitle" style="font-size:12px;color:#555;margin-top:3px"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button onclick="clearLocalChanges()" style="background:transparent;color:#3b82f6;border:1px solid #3b82f644;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:600;white-space:nowrap">✓ Clear Local Changes</button>
      <button onclick="resetToOriginal()" style="background:transparent;color:#ef4444;border:1px solid #ef444433;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:600;white-space:nowrap">↺ Reset to Original</button>
      <button onclick="exportJSON()" style="background:#22c55e;color:#000;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;white-space:nowrap">↓ Export Updated JSON</button>
    </div>
  </div>

  <!-- Summary cards -->
  <div id="summaryRow" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"></div>

  <!-- Tier row -->
  <div id="tierRow" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px"></div>

  <!-- Export reminder -->
  <div id="exportReminder" style="display:none;background:#1c2a1c;border:1px solid #22c55e33;border-radius:8px;padding:9px 14px;font-size:12px;color:#22c55e;margin-bottom:14px">
    Unsaved changes. <strong>Export JSON</strong> and upload to GitHub to update the live site.
  </div>

  <!-- Import from app panel -->
  <div style="background:#1a1a1a;border:1px solid #252525;border-radius:10px;margin-bottom:18px;overflow:hidden">
    <button onclick="toggleImport()" style="width:100%;background:none;border:none;color:#555;font-size:13px;font-weight:600;padding:11px 16px;text-align:left;display:flex;align-items:center;gap:6px">
      <span id="importArrow" style="font-size:10px">▶</span> Import From App
    </button>
    <div id="importPanel" style="display:none;padding:0 16px 16px">
      <div id="importContent"></div>
    </div>
  </div>

  <!-- Add play panel -->
  <div style="background:#1a1a1a;border:1px solid #252525;border-radius:10px;margin-bottom:18px;overflow:hidden">
    <button onclick="toggleAdd()" style="width:100%;background:none;border:none;color:#555;font-size:13px;font-weight:600;padding:11px 16px;text-align:left;display:flex;align-items:center;gap:6px">
      <span id="addArrow" style="font-size:10px">▶</span> Add New Play
    </button>
    <div id="addPanel" style="display:none;padding:0 16px 16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div><label class="fl">Date</label><input id="f_date" type="date" class="infield"></div>
        <div><label class="fl">Player</label><input id="f_player" type="text" placeholder="Player name" class="infield"></div>
        <div>
          <label class="fl">Market</label>
          <select id="f_market" class="infield">
            <option value="batter_hits">Hits</option>
            <option value="batter_total_bases">Total Bases</option>
            <option value="pitcher_strikeouts">Strikeouts</option>
            <option value="batter_home_runs">Home Runs</option>
            <option value="batter_rbis">RBIs</option>
            <option value="batter_runs_scored">Runs</option>
            <option value="pitcher_walks">Pitcher Walks</option>
          </select>
        </div>
        <div><label class="fl">Line (e.g. Over 1.5)</label><input id="f_line" type="text" placeholder="Over 1.5" class="infield"></div>
        <div><label class="fl">Confidence %</label><input id="f_conf" type="number" min="45" max="100" placeholder="75" class="infield"></div>
        <div>
          <label class="fl">Result</label>
          <select id="f_result" class="infield">
            <option value="pending">Pending</option>
            <option value="hit">Hit</option>
            <option value="miss">Miss</option>
            <option value="void">Void</option>
          </select>
        </div>
      </div>
      <button onclick="addPlay()" style="background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600">Add Play</button>
    </div>
  </div>

  <!-- Search + filter -->
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    <input id="searchBox" type="text" placeholder="Search player…" oninput="onSearch(this.value)"
      style="background:#1a1a1a;border:1px solid #252525;border-radius:8px;padding:8px 12px;color:#e8e8e8;font-size:13px;flex:1;min-width:160px;outline:none">
    <div id="filterPills" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>

  <!-- Days -->
  <div id="days"></div>
</div>

<div id="lsToast" style="position:fixed;bottom:20px;right:20px;background:#1a2a1a;border:1px solid #22c55e44;border-radius:8px;padding:8px 14px;font-size:12px;color:#22c55e;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100">Changes saved locally</div>

<script>
var plays=[], rawData={}, filter='pending', searchQ='', expandedDays={}, dirty=false;
var MKT_DISPLAY={batter_hits:'Hits',batter_total_bases:'Total Bases',pitcher_strikeouts:'Strikeouts',
  batter_home_runs:'Home Runs',batter_rbis:'RBIs',batter_runs_scored:'Runs',pitcher_walks:'Walks'};
var LS_KEY='propdesk_admin_changes';

/* password */
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
function checkPw(){
  if(document.getElementById('pwInput').value==='propdesk2026'){
    document.getElementById('gate').style.display='none';
    document.getElementById('main').style.display='block';
    loadData();
  } else {
    document.getElementById('pwErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
}

/* load */
function loadData(){
  fetch('propdesk-stats.json?_t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      rawData=d;
      var saved=null;
      try{var s=localStorage.getItem(LS_KEY);if(s)saved=JSON.parse(s);}catch(e){}
      plays=(saved||d.plays||[]).map(function(p,i){return Object.assign({},p,{_idx:i});});
      var pDays=uniq(plays.filter(function(p){return p.result==='pending';}).map(function(p){return p.date;})).sort();
      if(pDays.length) expandedDays[pDays[0]]=true;
      if(saved) document.getElementById('exportReminder').style.display='block';
      render();
    })
    .catch(function(){document.getElementById('days').innerHTML='<div style="color:#555;padding:40px;text-align:center">Failed to load propdesk-stats.json</div>';});
}

/* helpers */
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);});}
function confColor(c){return c>=82?'#22c55e':c>=68?'#3b82f6':'#888';}
function fmtDate(s){return new Date(s+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric'});}
function uniq(arr){var s={};arr.forEach(function(x){s[x]=1;});return Object.keys(s);}
function tierOf(c){c=Number(c);return c>=90?'ELITE':c>=75?'GREAT':c>=60?'GOOD':'VALUE';}
function fmtLine(line,mktDisplay){
  var m=String(line||'').match(/^[Oo]ver\s+(\d+)\.5$/);
  if(m) return (parseInt(m[1])+1)+'+ '+(mktDisplay||'');
  return line||'—';
}
function nextWeek(s){var d=new Date(s+'T12:00:00');d.setDate(d.getDate()+7);return d.toLocaleDateString([],{month:'short',day:'numeric'});}

/* render */
function render(){renderSummary();renderTiers();renderFilterPills();renderDays();}

function renderSummary(){
  var settled=plays.filter(function(p){return p.result==='hit'||p.result==='miss';});
  var hits=settled.filter(function(p){return p.result==='hit';}).length;
  var misses=settled.filter(function(p){return p.result==='miss';}).length;
  var pending=plays.filter(function(p){return p.result==='pending';}).length;
  var voids=plays.filter(function(p){return p.result==='void';}).length;
  var wr=settled.length?Math.round(hits/settled.length*100):0;
  document.getElementById('subtitle').innerHTML=
    'Since '+(rawData.recordStart||'—')
    +' &nbsp;·&nbsp; Updated '+(rawData.lastUpdated||'—')
    +' &nbsp;·&nbsp; <span style="color:#f59e0b">Next update: '+nextWeek(rawData.lastUpdated||new Date().toISOString().slice(0,10))+'</span>';
  function sc(label,body,sub){
    return '<div style="background:#1a1a1a;border:1px solid #252525;border-radius:12px;padding:13px 16px;flex:1;min-width:100px">'
      +'<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">'+label+'</div>'
      +body+(sub?'<div style="font-size:11px;color:#555;margin-top:3px">'+sub+'</div>':'')+'</div>';
  }
  document.getElementById('summaryRow').innerHTML=
    sc('Record','<span style="font-size:26px;font-weight:700;color:#22c55e">'+hits+'</span>'
      +'<span style="font-size:20px;color:#333"> – </span>'
      +'<span style="font-size:26px;font-weight:700;color:#ef4444">'+misses+'</span>',wr+'% hit rate')
    +sc('Total','<span style="font-size:26px;font-weight:700;color:#888">'+plays.length+'</span>',settled.length+' resolved')
    +sc('Pending','<span style="font-size:26px;font-weight:700;color:#f59e0b">'+pending+'</span>')
    +sc('Voids','<span style="font-size:26px;font-weight:700;color:#444">'+voids+'</span>');
}

function renderTiers(){
  var colors={ELITE:'#a78bfa',GREAT:'#22c55e',GOOD:'#3b82f6',VALUE:'#f59e0b'};
  var settled=plays.filter(function(p){return p.result==='hit'||p.result==='miss';});
  document.getElementById('tierRow').innerHTML=['ELITE','GREAT','GOOD','VALUE'].map(function(t){
    var tp=settled.filter(function(p){return p.tier===t;});
    var th=tp.filter(function(p){return p.result==='hit';}).length;
    var pend=plays.filter(function(p){return p.tier===t&&p.result==='pending';}).length;
    return '<div style="background:#1a1a1a;border:1px solid #252525;border-radius:8px;padding:7px 12px;flex:1;min-width:76px;text-align:center">'
      +'<div style="color:'+colors[t]+';font-size:11px;font-weight:700;margin-bottom:2px">'+t+'</div>'
      +'<div style="font-size:12px;color:#666">'+th+'–'+(tp.length-th)+(tp.length?' ('+Math.round(th/tp.length*100)+'%)':' —')+'</div>'
      +(pend?'<div style="font-size:10px;color:#555">+'+pend+' pending</div>':'')
      +'</div>';
  }).join('');
}

function renderFilterPills(){
  var cnts={all:plays.length};
  ['pending','hit','miss','void'].forEach(function(r){cnts[r]=plays.filter(function(p){return p.result===r;}).length;});
  document.getElementById('filterPills').innerHTML=[
    {k:'all',l:'All'},{k:'pending',l:'Pending'},{k:'hit',l:'Hit'},{k:'miss',l:'Miss'},{k:'void',l:'Void'}
  ].map(function(it){
    return '<button class="pill-btn'+(filter===it.k?' active':'')+'" data-res="'+it.k+'">'
      +it.l+' <span style="opacity:.5">'+cnts[it.k]+'</span></button>';
  }).join('');
  document.querySelectorAll('#filterPills [data-res]').forEach(function(btn){
    btn.addEventListener('click',function(){setFilter(btn.getAttribute('data-res'));});
  });
}

function visiblePlays(){
  var q=searchQ.toLowerCase();
  return plays.filter(function(p){
    if(filter!=='all'&&p.result!==filter) return false;
    if(q&&p.player.toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
}

function renderDays(){
  var vp=visiblePlays();
  if(!vp.length){
    document.getElementById('days').innerHTML='<div style="color:#444;font-size:14px;padding:40px;text-align:center">No plays match this filter.</div>';
    return;
  }
  var asc=filter==='pending';
  var dates=uniq(vp.map(function(p){return p.date;})).sort(function(a,b){return asc?a.localeCompare(b):b.localeCompare(a);});
  document.getElementById('days').innerHTML=dates.map(function(date){
    var dayVisible=vp.filter(function(p){return p.date===date;});
    var allDay=plays.filter(function(p){return p.date===date;});
    var hits=allDay.filter(function(p){return p.result==='hit';}).length;
    var miss=allDay.filter(function(p){return p.result==='miss';}).length;
    var pend=allDay.filter(function(p){return p.result==='pending';}).length;
    var settled=hits+miss;
    var wr=settled?Math.round(hits/settled*100):0;
    var expanded=!!expandedDays[date];

    var hdSum=allDay.length+' play'+(allDay.length!==1?'s':'')+' · '+hits+' hit / '+miss+' miss'+(pend?' · <span style="color:#f59e0b">'+pend+' pending</span>':'');

    var html='<div class="day-wrap">'
      +'<button class="day-hdr" data-date="'+date+'">'
      +'<span style="color:#444;font-size:11px;width:12px;flex-shrink:0">'+(expanded?'▾':'▸')+'</span>'
      +'<span style="color:#e8e8e8;font-size:13px;font-weight:700;margin-right:4px">'+fmtDate(date)+'</span>'
      +'<span style="color:#444;font-size:12px">'+hdSum+'</span>'
      +'</button>';

    if(expanded){
      html+='<div class="day-body">';
      // Context bar
      html+='<div class="ctx-bar">'
        +'<span style="color:#888">Day record: <strong style="color:#e8e8e8">'+hits+'/'+settled+'</strong>'+(settled?' ('+wr+'%)':' —')+'</span>'
        +(pend?'<span style="color:#f59e0b">'+pend+' still pending</span>':'<span style="color:#22c55e">All resolved</span>')
        +'</div>';
      // Bulk row (always shown)
      html+='<div class="bulk-row">'
        +(pend>0
          ?'<button data-bulk-date="'+date+'" data-bulk-res="hit" style="background:#1a3326;color:#22c55e;border:1px solid #22c55e33;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700">✓ Mark All Hit</button>'
          +'<button data-bulk-date="'+date+'" data-bulk-res="miss" style="background:#2d1515;color:#ef4444;border:1px solid #ef444433;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700">✕ Mark All Miss</button>'
          :'')
        +'<button data-del-date="'+date+'" style="margin-left:auto;background:transparent;color:#ef4444;border:1px solid #ef444433;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700">✕ Remove Day</button>'
        +'</div>';
      // Plays
      dayVisible.forEach(function(p){html+=renderRow(p);});
      html+='</div>';
    }
    html+='</div>';
    return html;
  }).join('');
  // Wire all interactive buttons directly — no delegation
  document.querySelectorAll('.day-hdr[data-date]').forEach(function(btn){
    var d=btn.getAttribute('data-date');
    btn.addEventListener('click',function(){toggleDay(d);});
  });
  document.querySelectorAll('[data-bulk-date]').forEach(function(btn){
    var d=btn.getAttribute('data-bulk-date'),r=btn.getAttribute('data-bulk-res');
    btn.addEventListener('click',function(){bulkResolve(d,r);});
  });
  document.querySelectorAll('[data-del-date]').forEach(function(btn){
    var d=btn.getAttribute('data-del-date');
    btn.addEventListener('click',function(){deleteDay(d);});
  });
  document.querySelectorAll('[data-res-idx]').forEach(function(btn){
    var idx=+btn.getAttribute('data-res-idx'),res=btn.getAttribute('data-res-val');
    btn.addEventListener('click',function(){
      var p=plays.find(function(x){return x._idx===idx;});
      var name=p?p.player:'?';
      if(res==='hit') console.log('Hit clicked:',name);
      else if(res==='miss') console.log('Miss clicked:',name);
      else if(res==='void') console.log('Void clicked:',name);
      setResult(idx,res);
    });
  });
}

function renderRow(p){
  var line=fmtLine(p.line,p.marketDisplay||MKT_DISPLAY[p.market]||p.market);
  var html='<div class="play-row">'
    +'<span style="font-weight:600;color:#e8e8e8;font-size:13px;min-width:130px;flex-shrink:0">'+esc(p.player)+'</span>'
    +'<span style="color:#555;font-size:12px;min-width:90px">'+esc(p.marketDisplay||MKT_DISPLAY[p.market]||p.market)+'</span>'
    +'<span style="font-family:monospace;color:#aaa;font-size:12px;min-width:110px">'+esc(line)+'</span>'
    +'<span style="font-size:12px;font-weight:600;min-width:40px;color:'+confColor(p.confidence)+'">'+p.confidence+'%</span>'
    +'<span class="badge '+esc(p.tier)+'">'+esc(p.tier)+'</span>'
    +'<div style="display:flex;gap:3px;margin-left:auto;flex-shrink:0">';
  ['hit','miss','void','pending'].forEach(function(r){
    var active=p.result===r;
    var lbl={hit:'✓ Hit',miss:'✕ Miss',void:'⊘',pending:'?'}[r];
    html+='<button class="res-btn'+(active?' active-'+r:'')+'" data-res-idx="'+p._idx+'" data-res-val="'+r+'">'+lbl+'</button>';
  });
  html+='</div></div>';
  return html;
}

/* actions */
function setFilter(f){filter=f;renderFilterPills();renderDays();}
function onSearch(q){searchQ=q;renderDays();}
function toggleDay(date){expandedDays[date]=!expandedDays[date];renderDays();}

function setResult(idx,result){
  var p=plays.find(function(x){return x._idx===idx;});
  if(!p) return;
  p.result=result;
  markDirty();
  render();
}

function bulkResolve(date,result){
  plays.forEach(function(p){if(p.date===date&&p.result==='pending') p.result=result;});
  markDirty();
  render();
}

function deleteDay(date){
  var count=plays.filter(function(p){return p.date===date;}).length;
  if(!confirm('Remove all '+count+' play'+(count!==1?'s':'')+' for '+fmtDate(date)+'? This cannot be undone.')) return;
  plays=plays.filter(function(p){return p.date!==date;});
  delete expandedDays[date];
  markDirty();
  render();
}

function markDirty(){dirty=true;document.getElementById('exportReminder').style.display='block';saveLocal();}

function saveLocal(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(plays.map(function(p){var c=Object.assign({},p);delete c._idx;return c;})));}catch(e){}
  showSaved();
}

function showSaved(){
  var el=document.getElementById('lsToast');
  if(!el) return;
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.opacity='0';},2000);
}

function resetToOriginal(){
  if(!confirm('This will discard all your unsaved hit/miss changes and reload from propdesk-stats.json. Are you sure?')) return;
  try{localStorage.removeItem(LS_KEY);}catch(e){}
  location.reload();
}

function clearLocalChanges(){
  try{localStorage.removeItem(LS_KEY);}catch(e){}
  location.reload();
}

function toggleAdd(){
  var p=document.getElementById('addPanel');
  var open=p.style.display!=='none';
  p.style.display=open?'none':'block';
  document.getElementById('addArrow').textContent=open?'▶':'▼';
}

function addPlay(){
  var date=document.getElementById('f_date').value;
  var player=document.getElementById('f_player').value.trim();
  var mkt=document.getElementById('f_market').value;
  var line=document.getElementById('f_line').value.trim();
  var conf=parseInt(document.getElementById('f_conf').value)||0;
  var result=document.getElementById('f_result').value;
  if(!date||!player||!conf){alert('Date, player, and confidence are required.');return;}
  plays.push({date:date,player:player,market:mkt,marketDisplay:MKT_DISPLAY[mkt]||mkt,
    sport:'MLB',line:line||'—',confidence:conf,tier:tierOf(conf),result:result,_idx:plays.length});
  markDirty();
  document.getElementById('f_player').value='';
  document.getElementById('f_line').value='';
  document.getElementById('f_conf').value='';
  render();
}

/* ── Import From App ─────────────────────────────────────────── */
var _importCandidates=[], _importTracked=[], _importQueued=[];

function toggleImport(){
  var p=document.getElementById('importPanel');
  var open=p.style.display!=='none';
  if(!open){ loadAndRenderImport(); p.style.display='block'; document.getElementById('importArrow').textContent='▼'; }
  else { p.style.display='none'; document.getElementById('importArrow').textContent='▶'; }
}

function loadAndRenderImport(){
  _importTracked=[]; _importQueued=[];
  try{ var s=localStorage.getItem('propdesk_user_plays'); if(s) _importTracked=JSON.parse(s)||[]; }catch(e){}
  try{ var s2=localStorage.getItem('propdesk_official_queue'); if(s2) _importQueued=JSON.parse(s2)||[]; }catch(e){}
  // Merge, dedupe within source by player+market+date
  var seen={};
  _importCandidates=[];
  [_importTracked,_importQueued].forEach(function(arr,si){
    (arr||[]).forEach(function(p){
      var k=(p.player||'')+'|'+(p.market||'')+'|'+(p.date||'');
      if(!seen[k]){ seen[k]=1; _importCandidates.push(Object.assign({},p,{_src:si===0?'track':'queue'})); }
    });
  });
  renderImportTable();
}

function _isAdminDupe(p){
  return plays.some(function(ex){ return ex.player===p.player&&ex.market===p.market&&ex.date===p.date; });
}

function renderImportTable(){
  var el=document.getElementById('importContent'); if(!el) return;
  if(!_importCandidates.length){
    el.innerHTML='<div style="color:#555;font-size:13px;padding:8px 0">No plays found in app localStorage.'
      +'<br><small style="color:#333;margin-top:4px;display:block">Use the + Track button in the main app to log plays first.</small></div>';
    return;
  }
  var dupeCount=_importCandidates.filter(_isAdminDupe).length;
  var trackCount=_importCandidates.filter(function(p){return p._src==='track';}).length;
  var queueCount=_importCandidates.filter(function(p){return p._src==='queue';}).length;
  var html='<div style="font-size:12px;color:#888;margin-bottom:4px">'
    +'Found <strong style="color:#e8e8e8">'+_importCandidates.length+'</strong> play'+((_importCandidates.length!==1)?'s':'')
    +(trackCount?' &nbsp;·&nbsp; <span style="color:#22c55e">'+trackCount+' from + Track</span>':'')
    +(queueCount?' &nbsp;·&nbsp; <span style="color:#3b82f6">'+queueCount+' from auto-queue</span>':'')
    +'</div>';
  if(dupeCount) html+='<div style="font-size:11px;color:#555;margin-bottom:6px">'+dupeCount+' already exist in propdesk-stats.json (will be skipped as duplicates)</div>';
  html+='<div class="imp-tbl">';
  _importCandidates.forEach(function(p,i){
    var dupe=_isAdminDupe(p);
    var conf=Number(p.confidence)||0;
    var tier=p.tier||tierOf(conf);
    var resCol={hit:'#22c55e',miss:'#ef4444',void:'#555',pending:'#888'}[p.result]||'#888';
    html+='<div class="imp-row'+(dupe?' dupe':' sel')+'" id="impr-'+i+'">'
      +'<input type="checkbox" class="import-cb" data-imp-idx="'+i+'" '+(dupe?'disabled':'checked')+' onchange="onImpCheck('+i+')" style="flex-shrink:0;accent-color:#22c55e">'
      +'<span style="font-size:11px;color:#555;min-width:62px;flex-shrink:0">'+esc(p.date||'—')+'</span>'
      +'<span style="font-weight:600;font-size:12px;color:#e8e8e8;min-width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px">'+esc(p.player||'—')+'</span>'
      +'<span style="font-size:11px;color:#555;min-width:72px;flex-shrink:0">'+esc(p.marketDisplay||MKT_DISPLAY[p.market]||p.market||'—')+'</span>'
      +'<span style="font-family:monospace;font-size:11px;color:#aaa;min-width:70px;flex-shrink:0">'+esc(p.line||'—')+'</span>'
      +'<span style="font-size:11px;font-weight:700;color:'+confColor(conf)+';min-width:34px;flex-shrink:0">'+conf+'%</span>'
      +'<span class="badge '+esc(tier)+'">'+esc(tier)+'</span>'
      +'<span style="font-size:11px;color:'+resCol+';margin-left:auto;flex-shrink:0">'+esc(p.result||'pending')+'</span>'
      +(dupe?'<span style="font-size:10px;color:#333;flex-shrink:0">dupe</span>':'')
      +'</div>';
  });
  html+='</div>';
  var selCount=_importCandidates.filter(function(p,i){ return !_isAdminDupe(p); }).length;
  html+='<div style="display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap">'
    +'<button onclick="doImport()" id="importBtn" style="background:#22c55e;color:#000;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;white-space:nowrap">Import '+selCount+' Selected Plays</button>'
    +'<label style="font-size:11px;color:#555;display:flex;align-items:center;gap:6px;cursor:pointer">'
    +'<input type="checkbox" id="clearAfterImport" style="accent-color:#22c55e"> Clear imported plays from app localStorage after import</label>'
    +'</div>'
    +'<div id="importResult" style="font-size:12px;color:#22c55e;margin-top:8px;min-height:18px"></div>';
  el.innerHTML=html;
}

function onImpCheck(i){
  var row=document.getElementById('impr-'+i);
  var cb=document.querySelector('.import-cb[data-imp-idx="'+i+'"]');
  if(row) row.className='imp-row'+(cb&&cb.checked?' sel':'');
  updateImportBtn();
}

function updateImportBtn(){
  var n=document.querySelectorAll('.import-cb:checked:not(:disabled)').length;
  var btn=document.getElementById('importBtn');
  if(btn) btn.textContent='Import '+n+' Selected Plays';
}

function doImport(){
  var checked=document.querySelectorAll('.import-cb:checked:not(:disabled)');
  var toImport=[], skipped=0;
  checked.forEach(function(cb){
    var p=_importCandidates[parseInt(cb.getAttribute('data-imp-idx'))];
    if(!p) return;
    if(_isAdminDupe(p)){skipped++;return;}
    toImport.push(p);
  });
  toImport.forEach(function(p){
    plays.push({
      date:p.date||new Date().toISOString().slice(0,10),
      player:p.player||'Unknown',
      market:p.market||'batter_hits',
      marketDisplay:p.marketDisplay||MKT_DISPLAY[p.market]||p.market||'—',
      sport:p.sport||'MLB',
      line:p.line||'—',
      confidence:Number(p.confidence)||0,
      tier:p.tier||tierOf(Number(p.confidence)||0),
      result:p.result||'pending',
      _idx:plays.length
    });
  });
  // Optionally clear imported entries from propdesk_user_plays
  if(toImport.length&&document.getElementById('clearAfterImport').checked){
    try{
      var impKeys={};
      toImport.forEach(function(p){impKeys[p.player+'|'+p.market+'|'+p.date]=1;});
      var rem=_importTracked.filter(function(p){return !impKeys[(p.player||'')+'|'+(p.market||'')+'|'+(p.date||'')];});
      if(rem.length) localStorage.setItem('propdesk_user_plays',JSON.stringify(rem));
      else localStorage.removeItem('propdesk_user_plays');
      _importTracked=rem;
    }catch(e){}
  }
  var resEl=document.getElementById('importResult');
  if(resEl) resEl.innerHTML='Imported <strong>'+toImport.length+'</strong> play'+(toImport.length!==1?'s':'')+'. '+skipped+' duplicate'+(skipped!==1?'s':'')+' skipped.';
  if(toImport.length){
    // Expand the most recent imported day
    var latest=toImport.reduce(function(m,p){return p.date>m?p.date:m;},'');
    if(latest) expandedDays[latest]=true;
    markDirty();
    render();
    // Refresh import table so dupe counts update
    renderImportTable();
    // Re-show result message (renderImportTable cleared it)
    var resEl2=document.getElementById('importResult');
    if(resEl2) resEl2.innerHTML='Imported <strong>'+toImport.length+'</strong> play'+(toImport.length!==1?'s':'')+'. '+skipped+' duplicate'+(skipped!==1?'s':'')+' skipped.';
  }
}

function exportJSON(){
  var out=Object.assign({},rawData,{
    lastUpdated:new Date().toISOString().slice(0,10),
    plays:plays.map(function(p){var c=Object.assign({},p);delete c._idx;return c;})
  });
  var blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='propdesk-stats.json';a.click();
  URL.revokeObjectURL(url);
  alert('Downloaded propdesk-stats.json\nAfter uploading to GitHub, click “Clear Local Changes” to reset your working copy.');
}
