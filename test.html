<!DOCTYPE html>
<html>
<body style="background:#0f0f0f;color:white;font-family:sans-serif;padding:40px">
<h2 id="status">JavaScript is NOT running</h2>
<button onclick="document.getElementById('status').textContent='JavaScript IS working!';document.getElementById('status').style.color='#00ff87'" style="padding:12px 24px;font-size:16px;cursor:pointer;background:#00ff87;border:none;border-radius:8px;font-weight:700">Click to Test JS</button>
<script>
document.getElementById('status').textContent = 'Page loaded - click the button to test clicks';
</script>
</body>
</html>
